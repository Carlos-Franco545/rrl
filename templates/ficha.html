<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta ="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha de inscripción</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#5f6c7b,#3e4c59);
    margin:0;
    padding:20px;
}

.container{
    max-width: 1300px;
    margin:auto;
    background:white;
    border-radius:15px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    color:white;
    margin-left:20px;
}

/* SECCIONES */
.section-title{
    background:#4a5d73;
    color:white;
    padding:10px 20px;
    border-radius:25px;
    display:inline-block;
    margin:25px 0 10px 0;
    font-weight:bold;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

/* CAMPOS */
.field{
    display:flex;
    flex-direction:column;
}

label{
    font-weight:bold;
    color:#4a5d73;
    margin-top:10px;
}

input{
    width:100%;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
    margin-top:5px;
}

/* RADIOS */
.radio-group{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    margin-top:10px;
}

/* BOTON */
button{
    background:#4a5d73;
    color:white;
    padding:15px;
    border:none;
    border-radius:25px;
    width:100%;
    font-size:16px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#2f3e4d;
}

.note{
    color:white;
    margin-left:20px;
}
</style>
</head>

<body>

<h1>Ficha de Inscripción de Alumnos (as)</h1>
<p class="note">Campos obligatorios *</p>

<div class="container">

<form action="/generar" method="POST">

<!-- DATOS PERSONALES -->
<div class="section-title">Datos Personales</div>

<div class="grid">

<div class="field"><label>Nombre del Alumno *</label><input type="text" ="Alumno" required></div>
<div class="field"><label>CURP  del Alumno *</label><input type="text" ="curpAlu" maxlength="18" required></div>
<div class="field"><label>Grado al que se Inscribe *</label><input type="number" ="grado" required></div>
<div class="field"><label>Grupo Asignado *</label><input type="text" ="grupo" required></div>
<div class="field"><label>Municipio de Procedencia *</label><input type="text" ="municipio" required></div>
<div class="field"><label>Años cumplidos *</label><input type="text" ="anoscum" required></div>

<div class="field"><label>Nombre de la Madre, Padre o Tutor *</label><input type="text" ="tutor" required></div>
<div class="field"><label>CURP de la Madre, Padre o Tutor *</label><input type="text" ="curpTut" maxlength="18" required></div>

<div class="field"><label>Ocupación de la Madre, Padre o Tutor*</label><input type="text" ="ocupa" required></div>
<div class="field"><label>Horario *</label><input type="text" ="hora" required></div>
<div class="field"><label>Escolaridad Maxima de la Madre, Padre o Tutor*</label><input type="text" ="escM" required></div>
<div class="field"><label>Domicilio de la Madre, Padre o Tutor</label><input type="text" ="direc"></div>

<div class="field"><label>Domicilio del Alumno (a) *</label><input type="text" ="doma" required></div>
<div class="field"><label>Entre Calle</label><input type="text" ="calle"></div>
<div class="field"><label>Y Calle</label><input type="text" ="calley"></div>
<div class="field"><label>Municipio *</label><input type="text" ="munic" required></div>

<div class="field"><label>Teléfono Casa</label><input type="tel" ="telefonoCasa"></div>
<div class="field"><label>Celular 1 *</label><input type="tel" ="cel1" required></div>
<div class="field"><label>Celular 2</label><input type="tel" ="cel2"></div>
<div class="field"><label>Celular para Agregar al Grupo de Whatsapp de Padre de Familia *</label><input type="tel" ="celWhatsapp" required></div>

</div>

<label>¿Cuenta su hijo(a) con Algun Tipo de Beca? *</label>
<div class="radio-group">
<label><input type="radio" ="beca" value="si"> SI</label>
<label><input type="radio" ="beca" value="no"> NO</label>
</div>

<div class="field"><label>¿Cuál?</label><input type="text" ="cualBe"></div>

<label>¿Ambos padres viven? *</label>
<div class="radio-group">
<label><input type="radio" ="padresViven" value="si"> SI</label>
<label><input type="radio" ="padresViven" value="no"> NO</label>
</div>

<label>¿Los Padres Viven Separados? *</label>
<div class="radio-group">
<label><input type="radio" ="separados" value="si"> SI</label>
<label><input type="radio" ="separados" value="no"> NO</label>
</div>

<div class="field"><label>En caso de ser Afirmativo ¿Con quién vive?</label><input type="text" ="vive"></div>

<label>¿Habla lengua indígena? *</label>
<div class="radio-group">
<label><input type="radio" ="lengua" value="si"> SI</label>
<label><input type="radio" ="lengua" value="no"> NO</label>
</div>

<div class="field"><label>¿Cuál?</label><input type="text" ="cuall"></div>

<!-- DATOS MEDICOS -->
<div class="section-title">Datos Médicos</div>

<div class="grid">
<div class="field"><label>Enfermedades en infancia *</label><input type="text" ="enfInf" required></div>

<div class="field"><label>Grupo Sanguíneo *</label><input type="text" ="sang" required></div>
<div class="field"><label>Enfermedades Que Padesca El Alumno(a) *</label><input type="text" ="enf" required></div>
<div class="field"><label>Intervenciones quirúrgicas *</label><input type="text" ="int" required></div>
<div class="field"><label>¿Cuál?</label><input type="text" ="cualMedico"></div>
<div class="field"><label>¿Sufre Alguna Enfermedad Cronica? *</label><input type="text" ="cro" required></div>
<div class="field"><label>¿Cuál?</label><input type="text" ="cualSufre"></div>
<div class="field"><label>Alergias</label><input type="text" ="alergia"></div>
</div>

<label>¿Toma Algun medicamento Permanente? *</label>
<div class="radio-group">
<label><input type="radio" ="medicamento" value="si"> SI</label>
<label><input type="radio" ="medicamento" value="no"> NO</label>
</div>
<div class="field"><label>¿Cuál?</label><input type="text" ="cualT"></div>

<label>¿Presente Alguna Enfermedad Cardiaca o Renal? *</label>
<div class="radio-group">
<label><input type="radio" ="cardiaca" value="si"> SI</label>
<label><input type="radio" ="cardiaca" value="no"> NO</label>
</div>
<div class="field"><label>¿Cuál?</label><input type="text" ="cualEnf"></div>

<label>¿Padece ASMA? *</label>
<div class="radio-group">
<label><input type="radio" ="asma" value="si"> SI</label>
<label><input type="radio" ="asma" value="no"> NO</label>
</div>

<label>¿Sufre Epilepsias o Convulsione? *</label>
<div class="radio-group">
<label><input type="radio" ="api" value="si"> SI</label>
<label><input type="radio" ="api" value="no"> NO</label>
</div>

<label>¿Padece Alguna Discapacidad? *</label>
<div class="radio-group">
<label><input type="radio" ="dis" value="si"> SI</label>
<label><input type="radio" ="dis" value="no"> NO</label>
</div>

<label>¿Cuando Se Enferma Asiste A? *</label>
<div class="radio-group">
<label><input type="radio" ="AsisA" value="si"> SI</label>
<label><input type="radio" ="AsisA" value="no"> NO</label>
</div>

<!-- ACADEMICO -->
<div class="section-title">Datos Académicos</div>

<div class="grid">
<div class="field"><label>Promedio Final del Grado Anteriol*</label><input type="number" ="prom" required></div>
<div class="field"><label>¿Repitió Algun Grado? *</label><input type="text" ="repG" required></div>
<div class="field"><label>Materias Con Las Que Presente Dificultades</label><input type="text" ="dificul"></div>
<div class="field"><label>Escuela Primaria de Procedencia *</label><input type="text" ="escuela" required></div>
</div>

<label>¿Tiene computadora? *</label>
<div class="radio-group">
<label><input type="radio" ="compu" value="si"> SI</label>
<label><input type="radio" ="compu" value="no"> NO</label>
</div>

<label>¿Tiene internet? *</label>
<div class="radio-group">
<label><input type="radio" ="internet" value="si"> SI</label>
<label><input type="radio" ="internet" value="no"> NO</label>
</div>

<label>Durante la Primaria ¿Tuvo Apoyo De Educasion Especias? *</label>
<div class="radio-group">
<label><input type="radio" ="EduEs" value="si"> SI</label>
<label><input type="radio" ="EduEs" value="no"> NO</label>
</div>
<div class="field"><label>Motivo</label><input type="text" ="moviEs"></div>

<!-- OTROS -->
<div class="section-title">Otros</div>

<div class="radio-group"></div>
<label>Su Hijo ¿Tiene un Empleo Por Las Tardes o Fines De Semana? *</label>
<div class="radio-group">
<label><input type="radio" ="trab" value="si"> SI</label>
<label><input type="radio" ="trab" value="no"> NO</label>
</div>
<div class="field"><label>Describalo</label><input type="text" ="desTrab"></div>


<div class="grid">
<div class="field"><label>Personas que viven con el Alumno(a) *</label><input type="number" ="viveCon" required></div>
</div>

<!-- TRASLADO -->
<div class="section-title">Desplazamiento a La Escuela</div>

<div class="field">
<label>Cuanto Tiempo Tarda en Llegar de su Casa a La Escuela *</label>
<input type="text" ="tiempo" required>
</div>

<div class="radio-group"></div>
<label>Lo Hace *</label>
<div class="radio-group">
<label><input type="radio" ="loHace" value="Caminando"> Caminando</label>
<label><input type="radio" ="loHace" value="Transporte"> Transporte</label>
</div>
<label>¿Cual? *</label> 
<div class="radio-group">
<label><input type="radio" ="TransporteTip" value="Caminando"> Combi</label>
<label><input type="radio" ="TransporteTip" value="Transporte"> Carro Particular</label>
<label><input type="radio" ="TransporteTip" value="Taxi Especial"> Taxi Especial</label>
<label><input type="radio" ="TransporteTip" value="Bicicleta"> Bicicleta</label>
<label><input type="radio" ="TransporteTip" value="Otro"> Otro</label>
</div>
<div class="field"><label>Otro ¿Cual?</label><input type="text" ="cualTip"></div>

<!-- OTROS ASPECTOS  -->
<div class="section-title">Otros Aspectos</div>

<div class="grid">
<div class="field"><label>Enfermedades manifestadas en la piel*</label><input type="number" ="pielEnf" required></div>
<div class="field"><label>Es alergico a algun medicamento y/o alimento*</label><input type="text" ="aleMe" required></div>
<div class="field"><label>Usa algun aparato auditivo o tiene problemas para escuchar bien*</label><input type="text" ="audio" required></div>
<div class="field"><label>Usa lentes o tiene problemas para ver bien*</label><input type="text" ="lentes" required></div>
<div class="field"><label>Presenta pie plano</label><input type="text" ="pie" ></div>
<div class="field"><label>Presenta algun problema de columna*</label><input type="text" ="columna" required></div>
<div class="field"><label>Presenta algun problema de riñon a vejiga*</label><input type="text" ="rinon" required></div>
<div class="field"><label>Presenta obecidad, desnutricion, diabetes, otras*</label><input type="text" ="desnutri" required></div>
</div>
<div class="field"><label>Alguna recomendacion extra, que considere que debamos saber</label><input type="text" ="recomendacion" ></div>

<div class="radio-group"></div>
<label>Es Zurdo *</label>
<div class="radio-group">
<label><input type="radio" ="zurdo" value="si"> SI</label>
<label><input type="radio" ="zurdo" value="no"> NO</label>
</div>

<div class="radio-group"></div>
<label>¿Necesita butaca Zurda? *</label>
<div class="radio-group">
<label><input type="radio" ="netZur" value="si"> SI</label>
<label><input type="radio" ="netZur" value="no"> NO</label>
</div>

<div class="radio-group"></div>
<label>¿Asiste o ha asistido a apoyo psicologico? *</label>
<div class="radio-group">
<label><input type="radio" ="psico" value="Caminando"> Si</label>
<label><input type="radio" ="psico" value="Transporte"> No</label>
</div>
<div class="field"><label>Razon</label><input type="text" ="razonPsi"></div>

<div class="radio-group"></div>
<label>El alumno presenta algun sindrome o espectro *</label>
<div class="radio-group">
<label><input type="radio" ="sindorme" value="Caminando"> Si</label>
<label><input type="radio" ="sindorme" value="Transporte"> No</label>
</div>
<div class="field"><label>En caso afirmativo ¿Cual?</label><input type="text" ="casoSin"></div>

<div class="field"><label>Anote cualquier observacion a tener en cuenta por los docentes, en el desarrollo de sus clases</label><input type="text" ="observacion" ></div>

<!-- Talla y peso  -->
<div class="section-title">Talla y peso</div>

<div class="grid">
<div class="field"><label>Estatura*</label><input type="number" ="estatura" required></div>
<div class="field"><label>Peso*</label><input type="text" ="peso" required></div>
<div class="field"><label>Talla de camisa o blusa*</label><input type="text" ="tallC" required></div>
<div class="field"><label>Talla de pantalon o falda*</label><input type="text" ="tallP" required></div>
<div class="field"><label>Talla de zapatos*</label><input type="text" ="tallaZ" required></div>

</div>
<div class="field"><label>Nombre del padre o tutor</label><input type="text" ="nobreT" ></div>

<button type="submit">Enviar Registro</button>

</form>

</div>

</body>
</html>
