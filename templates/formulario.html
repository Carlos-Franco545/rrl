<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cédula de Registro</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#5f6c7b,#3e4c59);
    margin:0;
    padding:20px;
}

.container{
    max-width: 1300px;
    margin:auto;
    background:white;
    border-radius:15px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    color:white;
    margin-left:20px;
}

.section-title{
    background:#4a5d73;
    color:white;
    padding:10px 20px;
    border-radius:25px;
    display:inline-block;
    margin:25px 0 10px 0;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.field{
    display:flex;
    flex-direction:column;
}

label{
    font-weight:bold;
    color:#4a5d73;
    margin-top:10px;
}

input, textarea{
    width:100%;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
    margin-top:5px;
}

.radio-group{
    display:flex;
    gap:20px;
    margin-top:10px;
}

button{
    background:#4a5d73;
    color:white;
    padding:15px;
    border:none;
    border-radius:25px;
    width:100%;
    font-size:16px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#2f3e4d;
}

.note{
    color:white;
    margin-left:20px;
}
</style>
</head>

<body>

<h1>Formulario de Registro</h1>
<p class="note">Campos obligatorios *</p>

<div class="container">
<form action="/generar" method="POST">

<!-- ALUMNO -->
<div class="section-title">Datos del Alumno</div>
<div class="grid">

<div class="field"><label>Ciclo Escolar</label><input type="text" name="cicloEscolar" value="2025-2026" readonly></div>
<div class="field"><label>Fecha</label><input type="date" name="fecha2"></div>
<div class="field"><label>NIA *</label><input type="number" name="nia" required></div>
<div class="field"><label>Apellido Paterno *</label><input type="text" name="apePatAl" required></div>
<div class="field"><label>Apellido Materno *</label><input type="text" name="apeMatAl" required></div>
<div class="field"><label>Nombre(s) *</label><input type="text" name="nombreAlu" required></div>
<div class="field"><label>CURP *</label><input type="text" name="curpAlu" maxlength="18" required></div>
<div class="field"><label>Fecha Nacimiento *</label><input type="date" name="fechaNacAlu" required></div>
<div class="field"><label>País Nacimiento *</label><input type="text" name="paisNacAlu" required></div>
<div class="field"><label>Entidad Nacimiento *</label><input type="text" name="entidadNacAlu" required></div>
<div class="field"><label>Discapacidad</label><input type="text" name="discAlu"></div>
<div class="field"><label>Tipo de Sangre</label><input type="text" name="tipSangreAlu"></div>
<div class="field"><label>Lengua Materna *</label><input type="text" name="lenguaMatAlu" required></div>

</div>

<label>Género *</label>
<div class="radio-group">
<label><input type="radio" name="generoHAlu" value="H"> Hombre</label>
<label><input type="radio" name="generoHAlu" value="M"> Mujer</label>
</div>

<!-- PADRE -->
<div class="section-title">Datos del Padre</div>
<div class="grid">

<div class="field"><label>Apellido Paterno *</label><input type="text" name="apePatPadre" required></div>
<div class="field"><label>Apellido Materno *</label><input type="text" name="apeMatPadre" required></div>
<div class="field"><label>Nombre(s) *</label><input type="text" name="nombrePadre" required></div>
<div class="field"><label>CURP *</label><input type="text" name="curpPadre" required></div>
<div class="field"><label>Fecha Nacimiento *</label><input type="date" name="fechaNacPadre" required></div>
<div class="field"><label>Pais de nacimiento</label><input type="text" name="paisNacPadre"></div>
<div class="field"><label>Nivel de Estudios</label><input type="text" name="nivelEstudiosPadre"></div>

<label>Vive con el alumno *</label>
<div class="radio-group">
<label><input type="radio" name="vivePadre" value="X"> Si</label>
<label><input type="radio" name="vivePadre" value="X"> No</label>
</div>
<label>En caso de no vivir con el alumno</label>
<div class="radio-group">
<label><input type="radio" name="TutorPadre" value="X"> Es el Tutol</label>
<label><input type="radio" name="TutorPadre" value="X"> Es el Finado</label>
</div>

<div class="field"><label>País de Residencia </label><input type="text" name="paisResPadre"></div>
<div class="field"><label>Entidad *</label><input type="text" name="entidadPadre" required></div>
<div class="field"><label>Municipio *</label><input type="text" name="municipioPadre" required></div>
<div class="field"><label>Localidad *</label><input type="text" name="locPadre" required></div>
<div class="field"><label>CP *</label><input type="text" name="cpPadre" required></div>
<div class="field"><label>Colonia *</label><input type="text" name="colPadre" required></div>
<div class="field"><label>Calle *</label><input type="text" name="callePadre" required></div>
<div class="field"><label>Num. Ext.</label><input type="text" name="numExtPadre"></div>
<div class="field"><label>Num. Int.</label><input type="text" name="numIntPadre"></div>

<div class="field"><label>Teléfono Fijo </label><input type="tel" name="telFijPadre"></div>
<div class="field"><label>Teléfono Celular *</label><input type="tel" name="telCelPadre" required></div>
<div class="field"><label>Email *</label><input type="email" name="emailPadre" required></div>
<div class="field"><label>Ocupación </label><input type="text" name="ocupacionPadre"></div>
<div class="field"><label>Horario </label><input type="text" name="horarioPadre"></div>
<div class="field"><label>Teléfono Trabajo </label><input type="tel" name="telTraPadre"></div>
<div class="field"><label>Extensión </label><input type="text" name="extPadre"></div>
<div class="field"><label>Email Trabajo </label><input type="email" name="emailTrabPadre"></div>

</div>

<!-- MADRE -->
<div class="section-title">Datos de la Madre</div>
<div class="grid">

<div class="field"><label>Apellido Paterno *</label><input type="text" name="apePatMadre" required></div>
<div class="field"><label>Apellido Materno *</label><input type="text" name="apeMatMadre" required></div>
<div class="field"><label>Nombre(s) *</label><input type="text" name="nombreMadre" required></div>
<div class="field"><label>CURP *</label><input type="text" name="curpMadre" required></div>
<div class="field"><label>Fecha Nacimiento</label><input type="date" name="fechaNacMadre"></div>
<div class="field"><label>Pais de nacimiento</label><input type="text" name="paisNacmadre"></div>
<div class="field"><label>Nivel de Estudios</label><input type="text" name="nivelEstudiosMadre"></div>

<label>Vive con el alumno *</label>
<div class="radio-group">
<label><input type="radio" name="viveMadre" value="X"> Si</label>
<label><input type="radio" name="viveMadre" value="X"> No</label>
</div>
<label>En caso de no vivir con el alumno</label>
<div class="radio-group">
<label><input type="radio" name="esTutorPadre" value="X"> Es el Tutol</label>
<label><input type="radio" name="esTutorPadre" value="X"> Es el Finado</label>
</div>

<div class="field"><label>País de Residencia </label><input type="text" name="paisResMadre"></div>
<div class="field"><label>Entidad *</label><input type="text" name="entidadMadre" required></div>
<div class="field"><label>Municipio *</label><input type="text" name="municipioMadre" required></div>
<div class="field"><label>Localidad *</label><input type="text" name="locMadre" required></div>
<div class="field"><label>CP *</label><input type="text" name="cpMadre" required></div>
<div class="field"><label>Colonia *</label><input type="text" name="colMadre" required></div>
<div class="field"><label>Calle *</label><input type="text" name="calleMadre" required></div>
<div class="field"><label>Num. Ext.</label><input type="text" name="numExtMadre"></div>
<div class="field"><label>Num. Int.</label><input type="text" name="numIntMadre"></div>

<div class="field"><label>Teléfono Fijo </label><input type="tel" name="telFijMadre"></div>
<div class="field"><label>Teléfono Celular *</label><input type="tel" name="telCelMadre" required></div>
<div class="field"><label>Email *</label><input type="email" name="emailMadre" required></div>
<div class="field"><label>Ocupación </label><input type="text" name="ocupacionMadre"></div>
<div class="field"><label>Horario </label><input type="text" name="horarioMadre"></div>
<div class="field"><label>Teléfono Trabajo </label><input type="tel" name="telTraMadre"></div>
<div class="field"><label>Extensión </label><input type="text" name="extMadre"></div>
<div class="field"><label>Email Trabajo </label><input type="email" name="emailTrabMadre"></div>

</div>

<!-- TUTOR -->
<div class="section-title">Datos del Tutor</div>
<div class="grid">

<div class="field"><label>Parentesco *</label><input type="text" name="parentescoTutor" required></div>
<div class="field"><label>Apellido Paterno *</label><input type="text" name="apePatTutor" required></div>
<div class="field"><label>Apellido Materno *</label><input type="text" name="apeMatTutor" required></div>
<div class="field"><label>Nombre *</label><input type="text" name="nombreTutor" required></div>
<div class="field"><label>CURP *</label><input type="text" name="curpTutor" maxlength="18" required></div>
<div class="field"><label>Fecha de nacimiento *</label><input type="date" name="fechaNacTutor" required></div>
<div class="field"><label>País de Nacimiento *</label><input type="text" name="paisNacTutor" required></div>
<div class="field"><label>Nivel de Estudios *</label><input type="text" name="nivelEstudiosTutor" required></div>

<label>Vive con el alumno *</label>
<div class="radio-group">
<label><input type="radio" name="viveTutor" value="X"> Si</label>
<label><input type="radio" name="viveTutor" value="X"> No</label>
</div>
<label>En caso de no vivir con el alumno ¿Es tutor legal?</label>
<div class="radio-group">
<label><input type="radio" name="esTutorSi" value="X">Si</label>
<label><input type="radio" name="esTutorNo" value="X">No</label>
</div>

<div class="field"><label>País de Residencia *</label><input type="text" name="paisResTutor" required></div>
<div class="field"><label>Entidad *</label><input type="text" name="entidadTutor" required></div>
<div class="field"><label>Municipio *</label><input type="text" name="municipioTutor" required></div>
<div class="field"><label>Localidad *</label><input type="text" name="locTutor" required></div>
<div class="field"><label>CP *</label><input type="text" name="cpTutor" required></div>
<div class="field"><label>Colonia *</label><input type="text" name="colTutor" required></div>
<div class="field"><label>Calle *</label><input type="text" name="calleTutor" required></div>
<div class="field"><label>Num. Ext. </label><input type="text" name="numExtTutor"></div>
<div class="field"><label>Num. Int. </label><input type="text" name="numIntTutor"></div>

<div class="field"><label>Teléfono Fijo</label><input type="tel" name="telFijTutor"></div>
<div class="field"><label>Teléfono Celular *</label><input type="tel" name="telCelTutor" required></div>
<div class="field"><label>Email *</label><input type="email" name="emailTutor" required></div>
<div class="field"><label>Ocupación</label><input type="text" name="ocupacionTutor"></div>
<div class="field"><label>Horario</label><input type="text" name="horarioTutor"></div>
<div class="field"><label>Teléfono Trabajo</label><input type="tel" name="telTraTutor"></div>
<div class="field"><label>Extensión</label><input type="text" name="extTutor"></div>
<div class="field"><label>Email Trabajo</label><input type="email" name="emailTrabTutor"></div>

</div>

<!-- DOCUMENTO -->
<div class="section-title">Documento Probatorio</div>
<div class="grid">

<div class="field"><label>Entidad Fedelar Registro *</label><input type="text" name="entidadFedReg" required></div>
<div class="field"><label>Municipio Registro *</label><input type="text" name="municipioReg" required></div>
<div class="field"><label>Año Registro *</label><input type="number" name="anioReg" required></div>

</div>

<div class="field">
<label>Observaciones</label>
<textarea name="observaciones1"></textarea>
</div>

<!-- ESCUELA -->
<div class="section-title">Datos de la Escuela</div>
<div class="grid">

<div class="field"><label>Nombre Escuela</label><input type="text" value="SEC. FED. GRAL. RODOLFO RODRÍGUEZ LEÓN" readonly></div>
<div class="field"><label>CCT</label><input type="text" value="21DES0079P" readonly></div>
<div class="field"><label>Turno</label><input type="text" value="MATUTINO" readonly></div>
<div class="field"><label>Grado *</label><input type="text" name="dGrado" required></div>
<div class="field"><label>Grupo *</label><input type="text" name="dGrupo" required></div>
<div class="field"><label>ZE</label><input type="text" name="dZE" value="03" readonly></div>

</div>

<button type="submit">Enviar Registro</button>

</form>
</div>

</body>
</html>
