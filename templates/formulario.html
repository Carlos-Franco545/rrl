<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cédula de Registro</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#5f6c7b,#3e4c59);
            margin:0;
            padding:20px;
        }

        .container{
            max-width: 1300px;
            margin:auto;
            background:white;
            border-radius:15px;
            padding:30px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            color:white;
            margin-left:20px;
        }

        .section-title{
            background:#4a5d73;
            color:white;
            padding:10px 20px;
            border-radius:25px;
            display:inline-block;
            margin:25px 0 10px 0;
            font-weight:bold;
        }

        .grid{
            display:grid;
            grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
            gap:15px;
        }

        .field{
            display:flex;
            flex-direction:column;
        }

        label{
            font-weight:bold;
            color:#4a5d73;
            margin-top:10px;
        }

        input, textarea{
            width:100%;
            padding:10px;
            border-radius:20px;
            border:1px solid #ccc;
            margin-top:5px;
            box-sizing: border-box;
        }

        .radio-group{
            display:flex;
            gap:20px;
            margin-top:10px;
            flex-wrap: wrap;
        }

        .radio-group label{
            font-weight: normal;
            color:#333;
            margin-top:0;
        }

        .radio-group input{
            width:auto;
            margin-right:5px;
        }

        button{
            background:#4a5d73;
            color:white;
            padding:15px;
            border:none;
            border-radius:25px;
            width:100%;
            font-size:16px;
            cursor:pointer;
            margin-top:20px;
        }

        button:hover{
            background:#2f3e4d;
        }

        .note{
            color:white;
            margin-left:20px;
        }
    </style>
</head>

<body>

    <h1>Formulario de Registro</h1>
    <p class="note">Campos obligatorios *</p>

    <div class="container">
        <form action="/generar_cedula" method="POST">

            <!-- ALUMNO -->

            <div class="grid">

                    <input type="text" id="cicloEscolar" name="cicloEscolar" value="2025-2026" readonly>
                </div>

                <div class="field">
                    <label for="fecha2">Fecha</label>
                    <input type="date" id="fecha2" name="fecha2">
                </div>

                <div class="field">
                    <label for="nia">NIA *</label>
                    <input type="number" id="nia" name="nia" required>
                </div>

                <div class="field">
                    <label for="apePatAl">Apellido Paterno *</label>
                    <input type="text" id="apePatAl" name="apePatAl" required>
                </div>

                <div class="field">
                    <label for="apeMatAl">Apellido Materno *</label>
                    <input type="text" id="apeMatAl" name="apeMatAl" required>
                </div>

                <div class="field">
                    <label for="nombreAlu">Nombre(s) *</label>
                    <input type="text" id="nombreAlu" name="nombreAlu" required>
                </div>

                <div class="field">
                    <label for="curpAlu">CURP *</label>
                    <input type="text" id="curpAlu" name="curpAlu" maxlength="18" required>
                </div>

                <div class="field">
                    <label for="fechaNacAlu">Fecha Nacimiento *</label>

                <div class="field">
                    <label for="paisNacAlu">País Nacimiento *</label>

                </div>

                <div class="field">
                    <label for="entidadNacAlu">Entidad Nacimiento *</label>
                    <input type="text" id="entidadNacAlu" name="entidadNacAlu" required>
                </div>

                <div class="field">
                    <label for="discAlu">Discapacidad</label>
                    <input type="text" id="discAlu" name="discAlu">
                </div>

                <div class="field">
                    <label for="tipSangreAlu">Tipo de Sangre</label>

                    <input type="text" id="lenguaMatAlu" name="lenguaMatAlu" required>
                </div>
            </div>

            <label>Género *</label>
            <div class="radio-group">
                <label><input type="radio" name="generoAlu" value="H" required> Hombre</label>
                <label><input type="radio" name="generoAlu" value="M" required> Mujer</label>
            </div>

            <!-- TUTOR -->

            <div class="grid">

                    <input type="text" id="parentescoTutor" name="parentescoTutor" required>
                </div>
