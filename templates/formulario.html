<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta ="viewport" content="width=device-width, initial-scale=1.0">
<title>Cédula de Registro</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#5f6c7b,#3e4c59);
    margin:0;
    padding:20px;
}

.container{
    max-width: 1300px;
    margin:auto;
    background:white;
    border-radius:15px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    color:white;
    margin-left:20px;
}

.section-title{
    background:#4a5d73;
    color:white;
    padding:10px 20px;
    border-radius:25px;
    display:inline-block;
    margin:25px 0 10px 0;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.field{
    display:flex;
    flex-direction:column;
}

label{
    font-weight:bold;
    color:#4a5d73;
    margin-top:10px;
}

input, textarea{
    width:100%;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
    margin-top:5px;
}

.radio-group{
    display:flex;
    gap:20px;
    margin-top:10px;
}

button{
    background:#4a5d73;
    color:white;
    padding:15px;
    border:none;
    border-radius:25px;
    width:100%;
    font-size:16px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#2f3e4d;
}

.note{
    color:white;
    margin-left:20px;
}
</style>
</head>

<body>

<h1>Formulario de Registro</h1>
<p class="note">Campos obligatorios *</p>

<div class="container">
<form action="/generar" method="POST">

<!-- ALUMNO -->
<div class="section-title">Datos del Alumno</div>
<div class="grid">

<div class="field"><label>Ciclo Escolar</label><input type="text" ="cicloEscolar" value="2025-2026" readonly></div>
<div class="field"><label>Fecha</label><input type="date" ="fecha2"></div>
<div class="field"><label>NIA *</label><input type="number" ="nia" required></div>
<div class="field"><label>Apellido Paterno *</label><input type="text" ="apePatAl" required></div>
<div class="field"><label>Apellido Materno *</label><input type="text" ="apeMatAl" required></div>
<div class="field"><label>Nombre(s) *</label><input type="text" ="nombreAlu" required></div>
<div class="field"><label>CURP *</label><input type="text" ="curpAlu" maxlength="18" required></div>
<div class="field"><label>Fecha Nacimiento *</label><input type="date" ="fechaNacAlu" required></div>
<div class="field"><label>País Nacimiento *</label><input type="text" ="paisNacAlu" required></div>
<div class="field"><label>Entidad Nacimiento *</label><input type="text" ="entidadNacAlu" required></div>
<div class="field"><label>Discapacidad</label><input type="text" ="discAlu"></div>
<div class="field"><label>Tipo de Sangre</label><input type="text" ="tipSangreAlu"></div>
<div class="field"><label>Lengua Materna *</label><input type="text" ="lenguaMatAlu" required></div>

</div>

<label>Género *</label>
<div class="radio-group">
<label><input type="radio" ="generoHAlu" value="H"> Hombre</label>
<label><input type="radio" ="generoHAlu" value="M"> Mujer</label>
</div>

<!-- PADRE -->
<div class="section-title">Datos del Padre</div>
<div class="grid">

<div class="field"><label>Apellido Paterno *</label><input type="text" ="apePatPadre" required></div>
<div class="field"><label>Apellido Materno *</label><input type="text" ="apeMatPadre" required></div>
<div class="field"><label>Nombre(s) *</label><input type="text" ="nombrePadre" required></div>
<div class="field"><label>CURP *</label><input type="text" ="curpPadre" required></div>
<div class="field"><label>Fecha Nacimiento *</label><input type="date" ="fechaNacPadre" required></div>
<div class="field"><label>Pais de nacimiento</label><input type="text" ="paisNacPadre"></div>
<div class="field"><label>Nivel de Estudios</label><input type="text" ="nivelEstudiosPadre"></div>

<label>Vive con el alumno *</label>
<div class="radio-group">
<label><input type="radio" ="vivePadre" value="X"> Si</label>
<label><input type="radio" ="vivePadre" value="X"> No</label>
</div>
<label>En caso de no vivir con el alumno</label>
<div class="radio-group">
<label><input type="radio" ="TutorPadre" value="X"> Es el Tutol</label>
<label><input type="radio" ="TutorPadre" value="X"> Es el Finado</label>
</div>

<div class="field"><label>País de Residencia </label><input type="text" ="paisResPadre"></div>
<div class="field"><label>Entidad *</label><input type="text" ="entidadPadre" required></div>
<div class="field"><label>Municipio *</label><input type="text" ="municipioPadre" required></div>
<div class="field"><label>Localidad *</label><input type="text" ="locPadre" required></div>
<div class="field"><label>CP *</label><input type="text" ="cpPadre" required></div>
<div class="field"><label>Colonia *</label><input type="text" ="colPadre" required></div>
<div class="field"><label>Calle *</label><input type="text" ="callePadre" required></div>
<div class="field"><label>Num. Ext.</label><input type="text" ="numExtPadre"></div>
<div class="field"><label>Num. Int.</label><input type="text" ="numIntPadre"></div>

<div class="field"><label>Teléfono Fijo </label><input type="tel" ="telFijPadre"></div>
<div class="field"><label>Teléfono Celular *</label><input type="tel" ="telCelPadre" required></div>
<div class="field"><label>Email *</label><input type="email" ="emailPadre" required></div>
<div class="field"><label>Ocupación </label><input type="text" ="ocupacionPadre"></div>
<div class="field"><label>Horario </label><input type="text" ="horarioPadre"></div>
<div class="field"><label>Teléfono Trabajo </label><input type="tel" ="telTraPadre"></div>
<div class="field"><label>Extensión </label><input type="text" ="extPadre"></div>
<div class="field"><label>Email Trabajo </label><input type="email" ="emailTrabPadre"></div>

</div>

<!-- MADRE -->
<div class="section-title">Datos de la Madre</div>
<div class="grid">

<div class="field"><label>Apellido Paterno *</label><input type="text" ="apePatMadre" required></div>
<div class="field"><label>Apellido Materno *</label><input type="text" ="apeMatMadre" required></div>
<div class="field"><label>Nombre(s) *</label><input type="text" ="nombreMadre" required></div>
<div class="field"><label>CURP *</label><input type="text" ="curpMadre" required></div>
<div class="field"><label>Fecha Nacimiento</label><input type="date" ="fechaNacMadre"></div>
<div class="field"><label>Pais de nacimiento</label><input type="text" ="paisNacmadre"></div>
<div class="field"><label>Nivel de Estudios</label><input type="text" ="nivelEstudiosMadre"></div>

<label>Vive con el alumno *</label>
<div class="radio-group">
<label><input type="radio" ="viveMadre" value="X"> Si</label>
<label><input type="radio" ="viveMadre" value="X"> No</label>
</div>
<label>En caso de no vivir con el alumno</label>
<div class="radio-group">
<label><input type="radio" ="esTutorPadre" value="X"> Es el Tutol</label>
<label><input type="radio" ="esTutorPadre" value="X"> Es el Finado</label>
</div>

<div class="field"><label>País de Residencia </label><input type="text" ="paisResMadre"></div>
<div class="field"><label>Entidad *</label><input type="text" ="entidadMadre" required></div>
<div class="field"><label>Municipio *</label><input type="text" ="municipioMadre" required></div>
<div class="field"><label>Localidad *</label><input type="text" ="locMadre" required></div>
<div class="field"><label>CP *</label><input type="text" ="cpMadre" required></div>
<div class="field"><label>Colonia *</label><input type="text" ="colMadre" required></div>
<div class="field"><label>Calle *</label><input type="text" ="calleMadre" required></div>
<div class="field"><label>Num. Ext.</label><input type="text" ="numExtMadre"></div>
<div class="field"><label>Num. Int.</label><input type="text" ="numIntMadre"></div>

<div class="field"><label>Teléfono Fijo </label><input type="tel" ="telFijMadre"></div>
<div class="field"><label>Teléfono Celular *</label><input type="tel" ="telCelMadre" required></div>
<div class="field"><label>Email *</label><input type="email" ="emailMadre" required></div>
<div class="field"><label>Ocupación </label><input type="text" ="ocupacionMadre"></div>
<div class="field"><label>Horario </label><input type="text" ="horarioMadre"></div>
<div class="field"><label>Teléfono Trabajo </label><input type="tel" ="telTraMadre"></div>
<div class="field"><label>Extensión </label><input type="text" ="extMadre"></div>
<div class="field"><label>Email Trabajo </label><input type="email" ="emailTrabMadre"></div>

</div>

<!-- TUTOR -->
<div class="section-title">Datos del Tutor</div>
<div class="grid">

<div class="field"><label>Parentesco *</label><input type="text" ="parentescoTutor" required></div>
<div class="field"><label>Apellido Paterno *</label><input type="text" ="apePatTutor" required></div>
<div class="field"><label>Apellido Materno *</label><input type="text" ="apeMatTutor" required></div>
<div class="field"><label>Nombre *</label><input type="text" ="nombreTutor" required></div>
<div class="field"><label>CURP *</label><input type="text" ="curpTutor" maxlength="18" required></div>
<div class="field"><label>Fecha de nacimiento *</label><input type="date" ="fechaNacTutor" required></div>
<div class="field"><label>País de Nacimiento *</label><input type="text" ="paisNacTutor" required></div>
<div class="field"><label>Nivel de Estudios *</label><input type="text" ="nivelEstudiosTutor" required></div>

<label>Vive con el alumno *</label>
<div class="radio-group">
<label><input type="radio" ="viveTutor" value="X"> Si</label>
<label><input type="radio" ="viveTutor" value="X"> No</label>
</div>
<label>En caso de no vivir con el alumno ¿Es tutor legal?</label>
<div class="radio-group">
<label><input type="radio" ="esTutorSi" value="X">Si</label>
<label><input type="radio" ="esTutorNo" value="X">No</label>
</div>

<div class="field"><label>País de Residencia *</label><input type="text" ="paisResTutor" required></div>
<div class="field"><label>Entidad *</label><input type="text" ="entidadTutor" required></div>
<div class="field"><label>Municipio *</label><input type="text" ="municipioTutor" required></div>
<div class="field"><label>Localidad *</label><input type="text" ="locTutor" required></div>
<div class="field"><label>CP *</label><input type="text" ="cpTutor" required></div>
<div class="field"><label>Colonia *</label><input type="text" ="colTutor" required></div>
<div class="field"><label>Calle *</label><input type="text" ="calleTutor" required></div>
<div class="field"><label>Num. Ext. </label><input type="text" ="numExtTutor"></div>
<div class="field"><label>Num. Int. </label><input type="text" ="numIntTutor"></div>

<div class="field"><label>Teléfono Fijo</label><input type="tel" ="telFijTutor"></div>
<div class="field"><label>Teléfono Celular *</label><input type="tel" ="telCelTutor" required></div>
<div class="field"><label>Email *</label><input type="email" ="emailTutor" required></div>
<div class="field"><label>Ocupación</label><input type="text" ="ocupacionTutor"></div>
<div class="field"><label>Horario</label><input type="text" ="horarioTutor"></div>
<div class="field"><label>Teléfono Trabajo</label><input type="tel" ="telTraTutor"></div>
<div class="field"><label>Extensión</label><input type="text" ="extTutor"></div>
<div class="field"><label>Email Trabajo</label><input type="email" ="emailTrabTutor"></div>

</div>

<!-- DOCUMENTO -->
<div class="section-title">Documento Probatorio</div>
<div class="grid">

<div class="field"><label>Entidad Fedelar Registro *</label><input type="text" ="entidadFedReg" required></div>
<div class="field"><label>Municipio Registro *</label><input type="text" ="municipioReg" required></div>
<div class="field"><label>Año Registro *</label><input type="number" ="anioReg" required></div>

</div>

<div class="field">
<label>Observaciones</label>
<textarea ="observaciones1"></textarea>
</div>

<!-- ESCUELA -->
<div class="section-title">Datos de la Escuela</div>
<div class="grid">

<div class="field"><label>Nombre Escuela</label><input type="text" value="SEC. FED. GRAL. RODOLFO RODRÍGUEZ LEÓN" readonly></div>
<div class="field"><label>CCT</label><input type="text" value="21DES0079P" readonly></div>
<div class="field"><label>Turno</label><input type="text" value="MATUTINO" readonly></div>
<div class="field"><label>Grado *</label><input type="text" ="dGrado" required></div>
<div class="field"><label>Grupo *</label><input type="text" ="dGrupo" required></div>
<div class="field"><label>ZE</label><input type="text" ="dZE" value="03" readonly></div>

</div>

<button type="submit">Enviar Registro</button>

</form>
</div>

</body>
</html>
