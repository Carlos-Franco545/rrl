<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Formularios Escolares</title>

<style>

body{
    font-family: Arial;

    background: linear-gradient(rgba(244, 246, 249, 0.35), rgba(244, 246, 249, 0.35)), url('static/fondo.jpg');
    background-size: cover;
    background-position: center;     
    background-repeat: no-repeat;    
    background-attachment: fixed;    
    text-align: center;
    padding-top: 100px;
}

h1 {
    margin-bottom: 50px;
    color: #003366; 
    text-shadow: 1px 1px 4px rgba(255, 255, 255, 0.8); 
}

.menu{
    display:flex;
    justify-content:center;
    gap:40px;
}

button{
    width:250px;
    height:120px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#003366;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0055aa;
    transform:scale(1.05);
}

</style>
</head>

<body>

<h1>Sistema de Registro Escolar</h1>

<div class="menu">

<a href="/formulario">
<button>
Registro de Alumno
</button>
</a>

<a href="/tecnologias">
<button>
Seleleccion de tecnologia
</button>
</a>

<a href="/ficha">
<button>
Ficha de inscripcion
</button>
</a>

<a href="/autorizacion">
<button>
Autorizacion de uso de imagen 
</button>
</a>

</div>

</body>
</html>
