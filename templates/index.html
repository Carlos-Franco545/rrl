<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Formularios Escolares</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(rgba(244, 246, 249, 0.35), rgba(244, 246, 249, 0.35)), url('static/fondo.jpg');
            background-size: cover;
            background-position: center;     
            background-repeat: no-repeat;    
            background-attachment: fixed;    
            text-align: center;
            padding-top: 50px;
            margin: 0;
        }

        h1 {
            margin-bottom: 30px;
            color: #003366; 
            text-shadow: 1px 1px 4px rgba(255, 255, 255, 0.8); 
        }

        h2 {
            margin-top: 40px;
            margin-bottom: 20px;
            color: #2c3e50;
            font-size: 22px;
        }

        .menu, .descargas {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }

        button {
            width: 230px;
            height: 110px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: #003366;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            background: #0055aa;
            transform: scale(1.05);
        }

        /* Estilos específicos para los botones de descarga */
        .btn-descarga {
            background: #16a085;
            height: 80px;
            font-size: 16px;
        }

        .btn-descarga:hover {
            background: #1abc9c;
        }
    </style>
</head>

<body>

    <h1>Sistema de Registro Escolar</h1>
    
    <h2>Llenado de Formularios</h2>
    <div class="menu">
        <a href="/formulario"><button>Registro de Alumno</button></a>
        <a href="/tecnologias"><button>Selección de Tecnología</button></a>
        <a href="/ficha"><button>Ficha de Inscripción</button></a>
        <a href="/autorizacion"><button>Autorización de Uso de Imagen</button></a>
    </div>

    <h2>Descargar Plantillas PDF Vacías</h2>
    <div class="descargas">
        <a href="/descargar/cedula"><button class="btn-descarga">Descargar Cédula Registro</button></a>
        <a href="/descargar/tecnologia"><button class="btn-descarga">Descargar Sel. Tecnología</button></a>
        <a href="/descargar/ficha"><button class="btn-descarga">Descargar Ficha Inscripción</button></a>
        <a href="/descargas/autorizacion"><button class="btn-descarga">Descargar Autorización Imagen</button></a>
    </div>

    <h2>Autorización de uso de Cámaras</h2>
    <h2>Descargeros y llenelos a mano con tinta azul</h2>
    <div class="descargas">
        <a href="/descargar/autorizacion-camara"><button class="btn-descarga">Descargar Autorización cámaras</button></a>
        <a href="/descargar/auto-camara"><button class="btn-descarga">Descargar Carta de corresponsabilidad Familia - Escuela</button></a>
    </div>

</body>
</html>
